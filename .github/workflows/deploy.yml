name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation)
        run: |
          echo "Building image with tag: ${{ github.sha }}"
          docker build -t backend-test:${{ github.sha }} .

      - name: Trigger Render Deploy
        run: curl --fail-with-body "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
